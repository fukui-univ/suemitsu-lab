<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福井大学 半導体集積デバイス工学研究室</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo">SID Lab</h1>
                <ul class="nav-menu">
                    <li><a href="#home" class="nav-link">ホーム</a></li>
                    <li><a href="#research" class="nav-link">研究内容</a></li>
                    <li><a href="#achievements" class="nav-link">研究業績</a></li>
                    <li><a href="#members" class="nav-link">メンバー</a></li>
                    <li><a href="#contact" class="nav-link">連絡先</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- ホームセクション -->
        <section id="home" class="hero">
            <div class="container">
                <h2 id="lab-name">福井大学 半導体集積デバイス工学研究室</h2>
                <p id="lab-description">最先端の半導体技術と集積デバイス工学を研究</p>
            </div>
        </section>

        <!-- 研究内容セクション -->
        <section id="research" class="section">
            <div class="container">
                <h2>研究内容</h2>
                <div id="research-content" class="content-grid"></div>
            </div>
        </section>

        <!-- 研究業績セクション -->
        <section id="achievements" class="section">
            <div class="container">
                <h2>研究業績</h2>
                <div id="achievements-content" class="achievements-list"></div>
            </div>
        </section>

        <!-- メンバーセクション -->
        <section id="members" class="section">
            <div class="container">
                <h2>メンバー</h2>
                <div id="members-content" class="members-grid"></div>
            </div>
        </section>

        <!-- 連絡先セクション -->
        <section id="contact" class="section">
            <div class="container">
                <h2>連絡先</h2>
                <div id="contact-content" class="contact-info"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 福井大学 半導体集積デバイス工学研究室. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
